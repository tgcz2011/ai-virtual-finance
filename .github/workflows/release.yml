name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux
            ext: ''
          - os: macos-latest
            target: macos
            ext: ''
          - os: windows-latest
            target: windows
            ext: '.exe'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Create virtual environment
        run: python -m venv .venv

      - name: Activate venv (Linux/macOS)
        if: runner.os != 'Windows'
        run: source .venv/bin/activate

      - name: Activate venv (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\.venv\Scripts\Activate.ps1

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        run: pyinstaller --onefile --name finance${{ matrix.ext }} src/main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: finance-${{ matrix.target }}
          path: dist/finance${{ matrix.ext }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: List files
        run: ls -R dist/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/finance-linux/finance
            dist/finance-macos/finance
            dist/finance-windows/finance.exe
          body: |
            ## Release Notes
            
            See [CHANGELOG.md](./CHANGELOG.md) for details.
            
            ## Downloads
            
            | Platform | File |
            |---|---|
            | Linux | `finance` |
            | macOS | `finance` |
            | Windows | `finance.exe` |
            
            ## Usage
            
            ```bash
            chmod +x finance
            ./finance
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
